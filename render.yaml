services:
  - type: web
    name: notepad2
    runtime: node
    plan: free
    region: singapore
    branch: main
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/me
    envVars:
      - key: NODE_ENV
        value: production
      - key: TURSO_URL
        sync: false
      - key: TURSO_TOKEN
        sync: false
      - key: APP_PASSWORD
        sync: false
      - key: SESSION_SECRET
        generateValue: true
